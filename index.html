<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arham.Wired</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:  #ff00dd;
    --accent2: #8605ff;
    --accent3: #0051ff;
    --screen_gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNnI3eXh2eGtlZmQ0MHhxYWR0ZjJlNzk3MDZxbHR3YmcxdjlqODdkbiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/vP5gXvSXJ2olG/giphy.gif";

    --accent01: #ff00dd;
    --accent02: #8605ff;
    --accent03: #0051ff;

  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background-color: #000;
    background-image: url('image_inv.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Share Tech Mono', "Courier New", monospace;
    color: #e0e0e0;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-color: rgba(0,0,0,0.82);
    z-index: 0;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.45) 2px,
      rgba(0,0,0,0.45) 4px
    );
    background-size: 100% 4px;
    animation: crt-buzz 0.4s linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes crt-buzz {
    0%   { background-position: 0 0; }
    100% { background-position: 0 4px; }
  }

  /* Corner decorations */
  .corner-gif {
    position: fixed;
    z-index: 5;
    image-rendering: pixelated;
    opacity: 0.7;
  }
  .corner-gif.tl { top: 14px; left: 14px; }
  .corner-gif.tr { top: 14px; right: 14px; transform: scaleX(-1); }

  /* Main stage */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
    padding: 20px;
    animation: fadein 1.4s ease both;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Animated tri-colour bar */
  .colour-bar {
    display: flex;
    width: 280px;
    height: 2px;
    margin-bottom: 22px;
  }
  .colour-bar span { flex: 1; }
  .colour-bar span:nth-child(1) { background: var(--accent01);  animation: pulse 2s 0.0s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(2) { background: var(--accent02); animation: pulse 2s 0.3s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(3) { background: var(--accent03); animation: pulse 2s 0.6s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(4) { background: var(--accent01);  animation: pulse 2s 0.9s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(5) { background: var(--accent02); animation: pulse 2s 1.2s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(5) { background: var(--accent03); animation: pulse 2s 1.5s ease-in-out infinite alternate; }
  .colour-bar span:nth-child(5) { background: var(--accent01); animation: pulse 2s 1.8s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 0.35; } to { opacity: 0.0; } }

  /* Name — VT323 for that chunky terminal display feel */
  h1 {
    font-family: 'VT323', monospace;
    color: #fff;
    margin: 0 0 4px 0;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 400;
    /*text-transform: lowercase;*/
    letter-spacing: 8px;
    line-height: 1;
    text-shadow:
      0 0 1px #fff,
      0 0 20px rgba(255, 255, 255, 0),
      2px 2px 0 rgba(0,0,0,0.8);
  }

  
  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 0; }
  }

  /* Subtitle — Share Tech Mono, bumped brightness */
  .subtitle {
    color: #ffffff;
    margin: 0 0 8px 0;
    font-size: 1.5rem;
    letter-spacing: 1px;
    text-transform: lowercase;
  }

  .dots {
    color: #2a2a2a;
    font-size: 0.6rem;
    letter-spacing: 4px;
    margin: 0 0 26px 0;
  }

  /* Menu — VT323 for size, Share Tech Mono fallback */
  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0 0 26px 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .menu-list a {
    font-family: 'VT323', monospace;
    color: #ffffff;
    text-decoration: none;
    font-size: 1.9rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 400;
    line-height: 1.3;
    transition: letter-spacing 0.15s, color 0.15s, text-shadow 0.15s;
    text-shadow: 1px 1px 0 #000;
  }

  .menu-list a::before { content: " "; color: #333; transition: color 0.15s; font-size: 1.5rem; }
  .menu-list a::after  { content: " "; color: #333; transition: color 0.15s; font-size: 1.5rem; }

  .menu-list li:nth-child(1) a:hover { color: var(--accent);  text-shadow: 0 0 14px rgba(255, 0, 0, 0.6); }
  .menu-list li:nth-child(1) a:hover::before,
  .menu-list li:nth-child(1) a:hover::after { color: var(--accent); }

  .menu-list li:nth-child(2) a:hover { color: var(--accent2); text-shadow: 0 0 14px rgba(255,110,199,0.6); }
  .menu-list li:nth-child(2) a:hover::before,
  .menu-list li:nth-child(2) a:hover::after { color: var(--accent2); }

  .menu-list li:nth-child(3) a:hover { color: var(--accent3); text-shadow: 0 0 14px rgba(255,224,102,0.6); }
  .menu-list li:nth-child(3) a:hover::before,
  .menu-list li:nth-child(3) a:hover::after { color: var(--accent3); }

  .menu-list a:hover { letter-spacing: 6px; }

  /* Socials */
  .socials {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .socials a {
    color: #ffffff;
    text-decoration: none;
    font-size: 1.2rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .socials a:hover { color: var(--accent); }
  .socials .sep { color: #222; }

  /* 88x31 badges */
  .badges {
    display: flex;
    justify-content: center;
    gap: 3px;
    flex-wrap: wrap;
    max-width: 560px;
  }

  .badges img {
    image-rendering: pixelated;
    border: 1px solid #1e1e1e;
    height: 31px;
    width: 88px;
    opacity: 0.6;
    transition: opacity 0.2s, border-color 0.2s;
  }

  .badges img:hover { opacity: 1; border-color: #555; }

  /* Bottom decorative bar */
  .gif-strip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0.05;
    line-height: 0;
  }

  .gif-strip img { display: block; width: 100%; image-rendering: pixelated; }

  @media (max-width: 480px) {
    .corner-gif { display: none; }
    h1 { font-size: 3rem; letter-spacing: 4px; }
    .menu-list a { font-size: 1.5rem; }
  }

  /* Sound Toggle Button */
  /* Audio Controls Wrapper */
  .audio-controls {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    z-index: 100;
  }

  /* Sound Toggle Button */
  .sound-btn {
    background: transparent;
    border: none;
    color: #555;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: color 0.2s, text-shadow 0.2s;
    padding: 0;
  }

  .sound-btn:hover {
    color: #fff;
  }

  .sound-btn.playing {
    color: var(--accent);
    text-shadow: 0 0 10px rgba(255, 0, 221, 0.6);
  }

  /* Volume Slider Container */
  .volume-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    color: #555;
    font-size: 0.9rem;
    transition: color 0.2s;
    /* Hidden by default, revealed when music plays! */
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* Show the slider only when playing */
  .audio-controls.is-active .volume-container {
    opacity: 1;
    pointer-events: all;
  }

  .volume-container:hover {
    color: #fff;
  }

  /* Retro Custom Slider Styling */
  input[type=range] {
    --webkit-appearance: none;
    width: 80px;
    background: transparent;
  }

  input[type=range]:focus {
    outline: none;
  }

  /* The track (the line) */
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 2px;
    cursor: pointer;
    background: #555;
  }

  /* The thumb (the draggable bit) */
  input[type=range]::-webkit-slider-thumb {
    height: 14px;
    width: 6px;
    border-radius: 0; /* Square retro look */
    background: #fff;
    cursor: pointer;
    -webkit-appearance: none;
    margin-top: -6px; /* Centers it on the line */
    box-shadow: 0 0 5px rgba(255,255,255,0.5);
  }

  input[type=range]::-webkit-slider-thumb:hover {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
</style>
</head>
<body>

  <div class="scanlines"></div>

  <img class="corner-gif tl" src="https://cyber.dabamos.de/88x31/counter.gif" width="0" height="0" alt="">
  <img class="corner-gif tr" src="https://cyber.dabamos.de/88x31/counter.gif" width="0" height="0" alt="">

  <div class="stage">

    <div class="colour-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <h1>Arham Tamim</h1>

    <p class="subtitle">Welcome to my corner of the internet</p>

    <p class="dots">&#9632; &nbsp; &#9632; &nbsp; &#9632;</p>

    <ul class="menu-list">
      <li><a href="https://github.com/atom-arham" target="_blank" rel="noopener noreferrer">Coding Projects</a></li>
      <li><a href="https://arham8.artstation.com/" target="_blank" rel="noopener noreferrer">3D Renders</a></li>
      <li><a href="resume.pdf">Resume</a></li>
    </ul>

    <div class="socials">
      <a href="mailto:atamim@mun.ca">email</a>
      <span class="sep">/</span>
      <a href="https://github.com/atom-arham" target="_blank" rel="noopener noreferrer">github</a>
      <span class="sep">/</span>
      <a href="https://www.linkedin.com/in/arham-tamim-6b0734290/" target="_blank" rel="noopener noreferrer">linkedin</a>
      <span class="sep">/</span>
      <a href="https://arham8.artstation.com/" target="_blank" rel="noopener noreferrer">artstation</a>
    </div>

    <div class="badges">
      <img src="https://blob.gifcities.org/gifcities/2R4M7RCJHJHWIZSIK5IBQBDC3QBXRJNY.gif" alt="Netscape Now">
      <img src="https://cyber.dabamos.de/88x31/linux.gif"   alt="Linux">
      <img src="https://cyber.dabamos.de/88x31/nvidia.gif"    alt="nvidia">
      <img src="https://cyber.dabamos.de/88x31/notepad-logo3.gif"     alt="Vim">
      <img src="https://lauriewired.com/img/got_html.gif" alt="Blender">
      <img src="https://web.archive.org/web/20091027095836if_/http://www.geocities.com/lahorca7/imag/Laineyes.gif" alt="">
    </div>

  </div>

  <div class="gif-strip">
    <img src="vhs-broken.gif" alt="">
  </div>
  <!-- Hidden Audio Element -->
  <audio id="bg-music" loop>
    <!-- Replace 'your-song.mp3' with the actual name of your audio file -->
    <source src="sound.mp3" type="audio/mpeg">
  </audio>

  <!-- The Sound Toggle Button -->
  <div class="audio-controls">
    <button id="sound-toggle" class="sound-btn">[ SOUND : OFF ]</button>
    <div class="volume-container">
      <span>VOL</span>
      <!-- The slider: values go from 0.0 (mute) to 1.0 (max) -->
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
  </div>

  <script>
    const music = document.getElementById('bg-music');
    const soundBtn = document.getElementById('sound-toggle');
    const volSlider = document.getElementById('vol-slider');
    const controlsContainer = document.querySelector('.audio-controls');

    // Set initial volume to whatever the slider is set to (0.5 or 50%)
    music.volume = volSlider.value;

    // Toggle Play/Pause
    soundBtn.addEventListener('click', function() {
      if (music.paused) {
        music.play();
        soundBtn.innerText = '[ SOUND : ON ]';
        soundBtn.classList.add('playing');
        controlsContainer.classList.add('is-active'); // Reveals slider
      } else {
        music.pause();
        soundBtn.innerText = '[ SOUND : OFF ]';
        soundBtn.classList.remove('playing');
        controlsContainer.classList.remove('is-active'); // Hides slider
      }
    });

    // Update Volume when slider is dragged
    volSlider.addEventListener('input', function() {
      music.volume = this.value;
    });
  </script>
</body>
</html>
